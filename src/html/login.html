<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23E85D04'/%3E%3Cg transform='translate(50,50)' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='Arial' font-size='55' font-weight='bold'%3E%3Ctext%3E%F0%9F%9B%A0%3C/text%3E%3C/g%3E%3C/svg%3E"
    />
    <title>Iniciar sesión — FerreSystem</title>
  </head>
  <body class="login-page">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-card__logo">
        <div class="login-card__logo-icon">
          <i class="bi bi-tools"></i>
        </div>
        <div class="login-card__logo-text">
          <h1>FerreSystem</h1>
          <span>Gestión de Inventario</span>
        </div>
      </div>

      <!-- Título -->
      <p class="login-card__title">Bienvenido</p>
      <p class="login-card__subtitle">
        Ingresá tus credenciales para continuar
      </p>

      <!--
        Error global del formulario.
        El JS agrega/quita la clase .visible para mostrarlo/ocultarlo.
        Ver _login.scss: &.visible { display: block; }
      -->
      <div class="login-card__error" id="login-error">
        <i class="bi bi-exclamation-circle"></i>
        <span id="login-error-msg"></span>
      </div>

      <!-- Formulario -->
      <form id="form-login" novalidate>
        <div class="form-group">
          <label for="username">Usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            placeholder="Ingresá tu usuario"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="Ingresá tu contraseña"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn btn--primary" id="btn-login">
          <i class="bi bi-box-arrow-in-right"></i>
          Iniciar sesión
        </button>
      </form>
    </div>
  </body>
</html>
